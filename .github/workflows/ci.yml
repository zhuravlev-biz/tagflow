name: ci

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  template-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: smoke-deploy the standalone template
        working-directory: templates/worker
        run: pnpm exec wrangler deploy --dry-run --outdir /tmp/wrangler-template
      - name: build + smoke-deploy the Astro mounted example
        working-directory: examples/astro-static-assets
        run: |
          pnpm exec astro build
          pnpm exec wrangler deploy --dry-run --outdir /tmp/wrangler-astro

  template-copyout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: pack the published-shape packages
        run: |
          mkdir -p /tmp/tagflow-tgz
          pnpm -r --filter './packages/*' exec pnpm pack --pack-destination /tmp/tagflow-tgz
      - name: copy the template out of the workspace, like the docs tell users to
        run: |
          cp -r templates/worker /tmp/tagflow-copyout
          rm -rf /tmp/tagflow-copyout/node_modules /tmp/tagflow-copyout/.wrangler /tmp/tagflow-copyout/dist
          find /tmp/tagflow-copyout -name '*.tsbuildinfo' -delete
      - name: point the standalone copy at the packed tarballs instead of the registry
        working-directory: /tmp/tagflow-copyout
        run: |
          npm pkg set "dependencies.@tagflow/cloudflare=file:/tmp/tagflow-tgz/tagflow-cloudflare-0.1.0.tgz"
          npm pkg set "devDependencies.@tagflow/cli=file:/tmp/tagflow-tgz/tagflow-cli-0.1.0.tgz"
          cat > pnpm-workspace.yaml <<'EOF'
          packages:
            - "."
          overrides:
            "@tagflow/core": "file:/tmp/tagflow-tgz/tagflow-core-0.1.0.tgz"
          allowBuilds:
            esbuild: true
            sharp: true
            workerd: true
          EOF
      - name: install the standalone template as a real user would
        working-directory: /tmp/tagflow-copyout
        run: pnpm install
      - name: typecheck the standalone template
        working-directory: /tmp/tagflow-copyout
        run: pnpm exec tsc --noEmit
      - name: smoke-deploy the standalone template
        working-directory: /tmp/tagflow-copyout
        run: pnpm exec wrangler deploy --dry-run --outdir /tmp/wrangler-copyout
