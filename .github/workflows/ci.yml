name: ci

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  template-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: smoke-deploy the standalone template
        working-directory: templates/worker
        run: pnpm exec wrangler deploy --dry-run --outdir /tmp/wrangler-template
      - name: build + smoke-deploy the Astro mounted example
        working-directory: examples/astro-static-assets
        run: |
          pnpm exec astro build
          pnpm exec wrangler deploy --dry-run --outdir /tmp/wrangler-astro
