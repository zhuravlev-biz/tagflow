# Weekly availability check for your affiliate config (§10 of the design
# doc). Fails the run — and can notify you — when a previously-available
# listing disappears, i.e. when clicks would start leaking to fallbacks.
#
# By default this uses the Creators API engine (PA-API's successor — PA-API
# itself was retired by Amazon on 2026-05-15), which requires
# CREATORSAPI_CREDENTIAL_ID and CREATORSAPI_CREDENTIAL_SECRET repository
# secrets from Associates Central → Tools → Creators API. The plain HTTPS
# probe engine is NOT suitable here: it must run from your own machine and
# IP, never from CI or datacenter infrastructure.
name: check-listings

on:
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx tagflow validate
      - run: npx tagflow check --engine creatorsapi
        env:
          CREATORSAPI_CREDENTIAL_ID: ${{ secrets.CREATORSAPI_CREDENTIAL_ID }}
          CREATORSAPI_CREDENTIAL_SECRET: ${{ secrets.CREATORSAPI_CREDENTIAL_SECRET }}
